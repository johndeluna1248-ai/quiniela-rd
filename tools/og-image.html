<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  /* Reset y tamaño exacto del og:image (1200x630 estándar) */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ═════════════════════════════════════════════════════
     CONTENEDOR PRINCIPAL — Estilo MINIMALISTA PROFESIONAL
     Inspirado en Bloomberg, NYT, Apple
     ═════════════════════════════════════════════════════ */
  .og-image {
    width: 1200px;
    height: 630px;
    /* Gradiente azul profundo sutil */
    background: linear-gradient(135deg, #0c1e3e 0%, #1e3a8a 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 110px;
    color: white;
    position: relative;
    overflow: hidden;
  }

  /* Acento decorativo sutil — líneas verticales amarillas a la derecha */
  .og-image::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 6px;
    height: 100%;
    background: #fbbf24;  /* amarillo dorado */
    opacity: 0.85;
  }

  /* Punto decorativo amarillo en la esquina superior derecha */
  .og-image::after {
    content: '';
    position: absolute;
    top: 50px;
    right: 50px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fbbf24;
    box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.2);
  }

  /* ═════════════════════════════════════════════════════
     EYEBROW (etiqueta pequeña arriba del título)
     "LOTERÍA DOMINICANA" — establece el contexto
     ═════════════════════════════════════════════════════ */
  .eyebrow {
    font-size: 22px;
    font-weight: 600;
    color: #fbbf24;  /* amarillo dorado */
    letter-spacing: 6px;
    margin-bottom: 36px;
    text-transform: uppercase;
  }

  /* ═════════════════════════════════════════════════════
     TÍTULO PRINCIPAL — Protagonista de la composición
     Tipografía grande, condensada, con peso
     ═════════════════════════════════════════════════════ */
  .title {
    font-size: 148px;
    font-weight: 800;
    letter-spacing: -5px;
    line-height: 0.95;
    margin-bottom: 34px;
    /* Leve sombra para mejor contraste */
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.25);
  }

  /* El "RD" en amarillo dorado — identidad dominicana */
  .title-rd {
    color: #fbbf24;
  }

  /* ═════════════════════════════════════════════════════
     DIVIDER — Línea decorativa que separa título y subtítulo
     Toque elegante tipo editorial
     ═════════════════════════════════════════════════════ */
  .divider {
    width: 100px;
    height: 4px;
    background: #fbbf24;
    margin-bottom: 34px;
    border-radius: 2px;
  }

  /* ═════════════════════════════════════════════════════
     SUBTÍTULO — Descripción clara del sitio
     ═════════════════════════════════════════════════════ */
  .subtitle {
    font-size: 34px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.9);
    line-height: 1.3;
    max-width: 760px;
    margin-bottom: 50px;
  }

  /* Texto destacado dentro del subtítulo */
  .subtitle strong {
    font-weight: 600;
    color: #ffffff;
  }

  /* ═════════════════════════════════════════════════════
     FOOTER — URL + badge de "en vivo" (opcional)
     Layout en fila para economizar espacio vertical
     ═════════════════════════════════════════════════════ */
  .footer-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* URL del sitio */
  .url {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 2px;
  }

  /* Separador vertical entre URL y badge */
  .footer-divider {
    width: 1px;
    height: 28px;
    background: rgba(255, 255, 255, 0.3);
  }

  /* Badge discreto "EN VIVO" */
  .live-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #a7f3d0;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Punto verde pulsante */
  .live-dot {
    width: 10px;
    height: 10px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 12px #10b981;
  }
</style>
</head>
<body>

<div class="og-image">

  <!-- Eyebrow: establece el contexto antes del título principal -->
  <div class="eyebrow">Resultados en vivo</div>

  <!-- Título principal: el protagonista absoluto -->
  <div class="title">Quiniela<span class="title-rd">RD</span></div>

  <!-- Línea decorativa amarilla: toque editorial -->
  <div class="divider"></div>

  <!-- Subtítulo: propuesta de valor clara y directa -->
  <div class="subtitle">
    Resultados de <strong>todas las loterías</strong><br>
    dominicanas, <strong>verificados en tiempo real</strong>.
  </div>

  <!-- Footer con URL + indicador de "en vivo" -->
  <div class="footer-row">
    <span class="url">quinielard.com</span>
    <div class="footer-divider"></div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>Actualizado en vivo</span>
    </div>
  </div>

</div>

</body>
</html>
