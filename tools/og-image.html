<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  /* Reset y tamaño exacto del og:image (1200x630 estándar) */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ═════════════════════════════════════════════════════
     CONTENEDOR PRINCIPAL — MINIMALISTA AGRESIVO
     Todo centrado, texto gigante, 3 elementos únicos.
     Optimizado para verse nítido en WhatsApp (pequeño).
     ═════════════════════════════════════════════════════ */
  .og-image {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0c1e3e 0%, #1e3a8a 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 60px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }

  /* Barras laterales amarillas (acentos editoriales) */
  .og-image::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 8px;
    height: 100%;
    background: #fbbf24;
  }
  .og-image::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 8px;
    height: 100%;
    background: #fbbf24;
  }

  /* ═════════════════════════════════════════════════════
     EYEBROW — "RESULTADOS EN VIVO" en amarillo grande
     Se lee incluso cuando la imagen está pequeña.
     ═════════════════════════════════════════════════════ */
  .eyebrow {
    font-size: 42px;
    font-weight: 700;
    color: #fbbf24;
    letter-spacing: 8px;
    margin-bottom: 25px;
    text-transform: uppercase;
  }

  /* ═════════════════════════════════════════════════════
     TÍTULO PRINCIPAL — "QuinielaRD" GIGANTE (220px)
     Protagonista absoluto. Se lee desde lejos.
     ═════════════════════════════════════════════════════ */
  .title {
    font-size: 220px;
    font-weight: 900;
    letter-spacing: -8px;
    line-height: 0.9;
    margin-bottom: 30px;
    text-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
  }

  /* "RD" en amarillo dorado (identidad dominicana) */
  .title-rd {
    color: #fbbf24;
  }

  /* ═════════════════════════════════════════════════════
     LÍNEA DE LOTERÍAS — Una sola línea que resume el alcance
     Listado de las loterías principales que cubre el sitio.
     ═════════════════════════════════════════════════════ */
  .lotteries {
    font-size: 44px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.92);
    letter-spacing: 3px;
    margin-top: 10px;
    /* Sombra sutil para mejor contraste */
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }
</style>
</head>
<body>

<div class="og-image">

  <!-- Eyebrow: contexto inmediato, bien visible -->
  <div class="eyebrow">Resultados en vivo</div>

  <!-- Título principal GIGANTE: el protagonista absoluto -->
  <div class="title">Quiniela<span class="title-rd">RD</span></div>

  <!-- Línea única con las loterías principales -->
  <div class="lotteries">Nacional · Leidsa · Loteka · Real</div>

</div>

</body>
</html>
